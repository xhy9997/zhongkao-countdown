<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一切皆是新的起点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        /* 为了确保文字在背景图片上清晰可见，添加半透明背景遮罩 */
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .countdown {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }
        
        .time-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            min-width: 100px;
        }
        
        .flip-container {
            position: relative;
            height: 40px;
            overflow: hidden;
        }
        
        .flip-digit {
            position: relative;
            height: 100%;
            transition: transform 0.6s ease-in-out;
        }
        
        .digit {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            width: 100%;
        }
        
        .flip-digit.flip {
            animation: flip 0.6s ease-in-out;
        }
        
        @keyframes flip {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-50%);
            }
            100% {
                transform: translateY(0);
            }
        }
        
        .time-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .exam-date {
            margin-top: 20px;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .message {
            margin-top: 30px;
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .time-box {
                padding: 15px;
                min-width: 60px;
            }
            
            .time-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>一切皆是新的起点<h1>
        <div class="countdown">
            <div class="time-box">
                <div class="flip-container">
                    <div class="flip-digit" id="days">
                        <div class="digit">00</div>
                    </div>
                </div>
                <div class="time-label">天</div>
            </div>
            <div class="time-box">
                <div class="flip-container">
                    <div class="flip-digit" id="hours">
                        <div class="digit">00</div>
                    </div>
                </div>
                <div class="time-label">时</div>
            </div>
            <div class="time-box">
                <div class="flip-container">
                    <div class="flip-digit" id="minutes">
                        <div class="digit">00</div>
                    </div>
                </div>
                <div class="time-label">分</div>
            </div>
            <div class="time-box">
                <div class="flip-container">
                    <div class="flip-digit" id="seconds">
                        <div class="digit">00</div>
                    </div>
                </div>
                <div class="time-label">秒</div>
            </div>
        </div>
        <div class="exam-date">物語の始まり：2026年7月1日</div>
        <div class="message" id="message">Everything is a new beginning.</div>
    </div>
    
    <script>
        // 中考日期：2026年7月1日 00:00:00
        const examDate = new Date('2026-07-01T00:00:00');
        
        // 存储当前值
        let currentValues = {
            days: '00',
            hours: '00',
            minutes: '00',
            seconds: '00'
        };
        
        function updateCountdown() {
            const now = new Date();
            const timeLeft = examDate - now;
            
            if (timeLeft <= 0) {
                updateDigit('days', '00');
                updateDigit('hours', '00');
                updateDigit('minutes', '00');
                updateDigit('seconds', '00');
                document.getElementById('message').textContent = 'Everything is a new beginning!';
                return;
            }
            
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000).toString().padStart(2, '0');
            
            updateDigit('days', days);
            updateDigit('hours', hours);
            updateDigit('minutes', minutes);
            updateDigit('seconds', seconds);
        }
        
        function updateDigit(id, newValue) {
            if (currentValues[id] === newValue) return;
            
            const digitElement = document.getElementById(id);
            digitElement.querySelector('.digit').textContent = newValue;
            
            // 添加翻转动画
            digitElement.classList.add('flip');
            currentValues[id] = newValue;
            
            // 动画结束后移除类
            setTimeout(() => {
                digitElement.classList.remove('flip');
            }, 600);
        }
        
        // 初始更新
        updateCountdown();
        // 每秒更新一次
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
